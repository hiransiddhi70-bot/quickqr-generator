<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickQR Generator by Siddhi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: white;
    font-family: 'Arial', sans-serif;
    padding: 20px;
    min-height: 100vh;
  }
.container { max-width: 500px; margin: 0 auto; text-align: center; }
  h1 {
    background: linear-gradient(90deg, #22c55e, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    font-size: 2rem;
  }
.subtitle { opacity: 0.7; margin-bottom: 30px; }

.form-group { margin-bottom: 20px; text-align: left; }
  label { display: block; margin-bottom: 8px; font-weight: bold; }
  input, textarea {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #1a1a1f;
    color: white;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(90deg, #22c55e, #3b82f6);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
  }
  button:hover { opacity: 0.9; }

  #qrcode {
    background: white;
    padding: 20px;
    border-radius: 20px;
    display: inline-block;
    margin: 20px 0;
    display: none;
  }
.download-btn {
    background: #a855f7;
    display: none;
  }

  footer { margin-top: 40px; opacity: 0.5; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ QuickQR Generator</h1>
  <p class="subtitle">Link, Text ya kuch bhi → QR banao 1 sec mein</p>

  <div class="form-group">
    <label>Enter Text or URL</label>
    <textarea id="qrText" rows="3" placeholder="https://linkedin.com/in/siddhihiran"></textarea>
  </div>

  <button onclick="generateQR()">🚀 Generate QR Code</button>

  <div id="qrcode"></div>
  <button class="download-btn" onclick="downloadQR()">📥 Download QR</button>

  <footer>Built by Siddhi Hiran | Day 14/20 #20Days20AI</footer>
</div>

<script>
let qr;

function generateQR() {
  const text = document.getElementById('qrText').value;
  if(text === "") {
    alert("Please enter something!");
    return;
  }

  document.getElementById('qrcode').innerHTML = "";
  document.getElementById('qrcode').style.display = "inline-block";
  document.querySelector('.download-btn').style.display = "block";

  qr = new QRCode(document.getElementById('qrcode'), {
    text: text,
    width: 256,
    height: 256,
    colorDark : "#000000",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.H
  });
}

function downloadQR() {
  const img = document.querySelector('#qrcode img') || document.querySelector('#qrcode canvas');
  const url = img.src || img.toDataURL();
  const a = document.createElement('a');
  a.href = url;
  a.download = 'quickqr.png';
  a.click();
}
</script>
</body>
</html>
